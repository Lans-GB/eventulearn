{% extends 'layout.html' %}

{% block content %}
<h2>Edit Event</h2>

<form method="POST" class="form">

    <label>Event Name</label>
    <input type="text" name="event_name" value="{{ event['event_name'] }}" required>

    <label>Organizer</label>
    <input type="text" name="organizer" value="{{ event['organizer'] }}" required>

    <label>Event Date</label>
    <input type="date" name="event_date" value="{{ event['event_date'] }}" required>

    <label>Venue</label>
    <input type="text" name="venue" value="{{ event['venue'] or '' }}">

    <label>Price</label>
    <input type="number" step="0.01" name="price" value="{{ event['price'] or 0 }}">

    <label>Capacity</label>
    <input type="number" name="capacity" value="{{ event['capacity'] }}" required>

    <label>Event Type</label>
    <input type="text" name="event_type" value="{{ event['event_type'] or '' }}">

    <label>Department</label>
    <input type="text" name="department" value="{{ event['department'] or '' }}">

    <label>Program</label>
    <input type="text" name="program" value="{{ event['program'] or '' }}">

    <label>Short Description</label>
    <textarea name="short_desc">{{ event['short_desc'] or '' }}</textarea>

    <label>Long Description</label>
    <textarea name="long_desc">{{ event['long_desc'] or '' }}</textarea>

    <button type="submit" class="btn">Update Event</button>

</form>

<br>

<a href="/manage_events" class="btn">Back</a>

{% endblock %}
